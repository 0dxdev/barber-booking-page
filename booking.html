<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elite Cuts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!--HEADER-->
  <header class="header">
  <nav class="navbar">
    
  <h1 class="logo">Elite Cuts</h1>
    
  <ul class="nav-links">
    <li><a href="#home">Home</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#contact">Contact</a></li>
    <li><a href="booking.html" class="book-btn">Book</a></li>
  </ul>
  
  </nav>
  </header>

<!--SECTION-->
<section class="section">
  <div class="container">

    <h2 class="section-title">Book Appointment</h2>

    <!-- DATE -->
    <p id="selected-date">No date selected</p>
    <h3 id="month-title"></h3>

    <div class="month-controls">
    <button id="prev-month">←</button>
    <button id="next-month">→</button>
    </div>

    <div class="days-header">
      <div>Sun</div>
      <div>Mon</div>
      <div>Tue</div>
      <div>Wed</div>
      <div>Thu</div>
      <div>Fri</div>
      <div>Sat</div>
    </div>

    <div id="calendar"></div>


    <!-- FORM -->
    <form id="booking-form">

      <!-- SERVICE -->
      <label for="service">Choose Service</label>
      <select id="service" required>
        <option value="">Select a service</option>
        <option>Haircut</option>
        <option>Beard</option>
        <option>Combo</option>
      </select>

      <!-- TIME -->
      <h3>Pick a Time</h3>
      <div id="time-slots">
        <button type="button" class="time-btn">10:00 AM</button>
        <button type="button" class="time-btn">11:00 AM</button>
        <button type="button" class="time-btn">12:00 PM</button>
      </div>

      <p id="selected-time">No time selected</p>

      <!-- INFO -->
      <h3>Your Info</h3>

      <input type="text" id="name" placeholder="Your Name" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>

      <!-- SUBMIT -->
      <button type="submit" class="confirm-btn">Confirm Booking</button>

    </form>

  </div>
</section>

<script src="script.js"></script>

</body>
