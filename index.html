<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elite Cuts</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="hero">
    <h1>Elite Cuts</h1>
    <p>Modern fades. Clean look. Book in seconds.</p>
  </header>

  
  <section class="section">
    <h2>Services</h2>

    <div class="services">
      <div class="card">Haircut - $30</div>
      <div class="card">Beard - $15</div>
      <div class="card">Combo - $40</div>
    </div>
  </section>

  
  <section class="section">
    <h2>Book Appointment</h2>

    <p id="selected-date">No date selected</p>
    <div id="calendar"></div>

    <label>Choose Service</label>
    <select id="service">
      <option>Haircut</option>
      <option>Beard</option>
      <option>Combo</option>
    </select>

    <h3>Pick a Time</h3>
    <div id="time-slots">
      <button class="time-btn" onclick="selectTime(this)">10:00 AM</button>
      <button class="time-btn" onclick="selectTime(this)">11:00 AM</button>
      <button class="time-btn" onclick="selectTime(this)">12:00 PM</button>
    </div>

    <p id="selected-time">No time selected</p>

    <h3>Your Info</h3>
    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="phone" placeholder="Phone Number">

    <button class="confirm-btn" onclick="submitBooking()">Confirm Booking</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
